<!DOCTYPE html>
<html>
<head>
    <title>OptiCrop - Crop Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌱 OptiCrop</h1>
    <h2>Smart Agricultural Production Optimization Engine</h2>

    <form method="POST">

        <input type="number" name="N" placeholder="Nitrogen (N)" required><br><br>

        <input type="number" name="P" placeholder="Phosphorous (P)" required><br><br>

        <input type="number" name="K" placeholder="Potassium (K)" required><br><br>

        <input type="number" step="0.01" name="temperature" placeholder="Temperature (°C)" required><br><br>

        <input type="number" step="0.01" name="humidity" placeholder="Humidity (%)" required><br><br>

        <input type="number" step="0.01" name="ph" placeholder="Soil pH" required><br><br>

        <input type="number" step="0.01" name="rainfall" placeholder="Rainfall (mm)" required><br><br>

        <button type="submit">Recommend Crop</button>

    </form>
    {% if prediction %}
<div class="result">
    Recommended Crop: {{ prediction }}
</div>
{% endif %}

</div>

</body>
</html>
